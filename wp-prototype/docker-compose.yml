services:
  mysql-db:
    image: mysql:8.0
    container_name: mesajlasma-mysql
    environment:
      MYSQL_DATABASE: message_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: ms_user
      MYSQL_PASSWORD: ms_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
