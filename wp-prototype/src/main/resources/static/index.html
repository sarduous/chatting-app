<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>Whatsup</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="chat-container">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 12px;">
                <h2 id="grup-adi" style="transition: all 0.3s ease; margin: 0;">Sohbet Odası</h2>
                <span id="user-status-text"
                    style="font-size: 0.85rem; font-weight: 500; display: none; align-items: center; gap: 5px; opacity: 0.9;">
                    <i id="status-icon" class="fa-solid fa-circle" style="font-size: 0.5rem;"></i>
                    <span id="status-label">Bağlanıyor...</span>
                </span>
            </div>
        </div>

        <div class="messages" id="message-list">
            <div id="typing" class="typing-container">
                <div id="typing-avatars-box" class="typing-avatars"></div>
                <div class="typing-bubble">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
                <div class="typing-text" id="typing-username-text">yazıyor...</div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-row">
                <input type="text" id="message-input" placeholder="Bir mesaj yazın..."
                    onkeypress="handleKeyPress(event)" oninput="klavyetiklama()">
                <button onclick="sendMessage()">Gönder</button>
            </div>
        </div>

    </div>

    <!-- grup üyeleri listeleme modal -->
    <div id="uyelerModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 10px; color: #333;"><span id="modal-grup-adi"></span> Kullanıcıları</h3>
            <div class="uyeler-listesi-container" id="modal-uyeler-listesi">
                <div style="text-align:center; color:#888;">Yükleniyor...</div>
            </div>
            <div class="modal-btn-row">
                <button class="btn-ekle" onclick="kullaniciEkleme()"><i class="fa-solid fa-circle-plus"></i>Kullanıcı
                    Ekle</button>
                <button class="btn-kapat" onclick="uyelerModalKapat()">Kapat</button>
            </div>
        </div>
    </div>

    <!-- kullanıcı ekleme modalı -->
    <div id="kullaniciEkleModal" class="modal">
        <div class="modal-content" style="width: 320px; padding: 25px; border-radius: 12px; text-align: left;">
            <h3 style="margin-bottom: 15px; color: #444; font-size: 1.1rem; text-align: left;">Kişileri Seç:</h3>
            <div id="eklenecek-kullanicilar-listesi"
                style="max-height: 180px; overflow-y: auto; border: 1px solid #e1e1e1; border-radius: 8px; padding: 10px; background: #fafafa; margin-bottom: 20px;">
                <div style="text-align:center; color:#888;">Yükleniyor...</div>
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn-ekle" onclick="secilenleriGrubaEkle()"
                    style="flex: 1; justify-content: center; padding: 12px; border-radius: 8px;">Ekle</button>
                <button onclick="kullaniciEkleModalKapat()"
                    style="flex: 1; padding: 12px; background: #f1f2f6; color: #333; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s;">İptal</button>
            </div>
        </div>
    </div>

    <!-- sağ tık menüsü -->
    <div id="custom-context-menu" class="context-menu">
        <div class="context-menu-item" id="delete-message-btn">
            <i class="fa-solid fa-trash-can"></i> Mesajı Sil
        </div>
    </div>

    <!-- js bağlantısı -->
    <script src="chat.js"></script>
</body>

</html>
